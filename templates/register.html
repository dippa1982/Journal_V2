{% extends "base.html" %}

{% block title %}Create Account{% endblock %}

{% block content_login %}

<div class="login-container">

    <div class="login-card">

        <div class="text-center mb-5">

            <h1>📔 My Journal</h1>

            <p class="text-muted">

                Create your personal journal.

            </p>

        </div>

        <form method="POST">

            <div class="mb-4">

                <label class="form-label">

                    Username

                </label>

                <input
                    type="text"
                    name="username"
                    class="form-control"
                    placeholder="Choose a username"
                    required>

            </div>

            <div class="mb-4">

                <label class="form-label">

                    Password

                </label>

                <input
                    type="password"
                    name="password"
                    class="form-control"
                    placeholder="Create a password"
                    required>

            </div>

            <div class="mb-5">

                <label class="form-label">

                    Confirm Password

                </label>

                <input
                    type="password"
                    name="confirm_password"
                    class="form-control"
                    placeholder="Confirm your password"
                    required>

            </div>

            <button
                type="submit"
                class="btn btn-primary w-100">

                Create Account

            </button>

        </form>

        <hr class="my-4">

        <p class="text-center text-muted">

            Already have an account?

        </p>

        <a href="{{ url_for('auth.login') }}"
           class="btn btn-secondary w-100">

            Sign In

        </a>

    </div>

</div>

{% endblock %}
